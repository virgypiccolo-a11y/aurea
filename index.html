<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Auréa">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1fae7e">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" type="image/png" href="icon-192.png">
<title>Auréa · Benessere & Estetica</title>
<style>
:root{
  --bg:#f4f7f5;
  --card:#ffffff;
  --ink:#12211b;
  --muted:#6b7c74;
  --line:#e7ede9;
  --green:#1fae7e;
  --green-d:#128a63;
  --mint:#e5f7ef;
  --coral:#ff6f8b;
  --coral-s:#ffe6ec;
  --violet:#7c5cff;
  --violet-s:#ece7ff;
  --amber:#f5a623;
  --blue:#3b9dff;
  --shadow:0 10px 30px rgba(18,33,27,.08);
  --radius:20px;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  background:linear-gradient(160deg,#dfeee7,#eef3f0 40%,#f6eff4);
  color:var(--ink);
  min-height:100vh;
  display:flex;align-items:center;justify-content:center;
  padding:24px 12px;
}
/* Phone frame */
.phone{
  width:100%;max-width:430px;height:900px;max-height:94vh;
  background:var(--bg);
  border-radius:40px;
  box-shadow:0 30px 70px rgba(18,33,27,.28), 0 0 0 10px #10201a, 0 0 0 12px #24352d;
  overflow:hidden;position:relative;display:flex;flex-direction:column;
}
.statusbar{
  height:44px;flex:0 0 44px;display:flex;align-items:center;justify-content:space-between;
  padding:0 22px;font-size:13px;font-weight:600;color:var(--ink);
  background:transparent;
}
.statusbar .dots{display:flex;gap:5px;align-items:center}
.statusbar .dots span{width:6px;height:6px;border-radius:50%;background:var(--ink);opacity:.7}
.viewport{flex:1;overflow-y:auto;overflow-x:hidden;position:relative;scroll-behavior:smooth}
.viewport::-webkit-scrollbar{width:0}
.screen{display:none;padding:6px 18px 120px;animation:fade .35s ease}
.screen.active{display:block}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

/* Header */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:6px 0 14px}
.hello .k{font-size:12px;color:var(--muted);font-weight:600;letter-spacing:.3px}
.hello .n{font-size:22px;font-weight:800;margin-top:2px}
.avatar{width:46px;height:46px;border-radius:16px;background:linear-gradient(135deg,var(--green),#4bd4a6);
  display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:17px;box-shadow:var(--shadow)}
.back{display:inline-flex;align-items:center;gap:6px;background:var(--card);border:1px solid var(--line);
  border-radius:12px;padding:8px 12px;font-weight:700;font-size:13px;color:var(--ink);margin-bottom:14px;cursor:pointer}

/* Cards */
.card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px;margin-bottom:16px}
.card.tight{padding:14px}
.h{font-size:17px;font-weight:800;margin:2px 0 12px;display:flex;align-items:center;gap:8px}
.h .pill{margin-left:auto;font-size:11px;font-weight:700;color:var(--green-d);background:var(--mint);padding:4px 10px;border-radius:20px}
.sub{font-size:12.5px;color:var(--muted);line-height:1.5}
.section-title{font-size:15px;font-weight:800;margin:22px 4px 12px;display:flex;align-items:center;gap:8px}
.section-title .more{margin-left:auto;font-size:12px;color:var(--green-d);font-weight:700;cursor:pointer}

/* Ring */
.ring-wrap{display:flex;align-items:center;gap:18px}
.ring{position:relative;width:120px;height:120px;flex:0 0 120px}
.ring svg{transform:rotate(-90deg)}
.ring .c-val{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.ring .c-val b{font-size:26px;font-weight:800;line-height:1}
.ring .c-val small{font-size:11px;color:var(--muted);font-weight:600}
.macros{flex:1;display:flex;flex-direction:column;gap:12px}
.macro .lbl{display:flex;justify-content:space-between;font-size:12px;font-weight:700;margin-bottom:5px}
.macro .lbl span:last-child{color:var(--muted)}
.bar{height:8px;background:var(--line);border-radius:20px;overflow:hidden}
.bar > i{display:block;height:100%;border-radius:20px}

/* Stat grid */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.stat{background:var(--card);border-radius:18px;box-shadow:var(--shadow);padding:14px}
.stat .ico{width:38px;height:38px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:19px;margin-bottom:8px}
.stat .v{font-size:20px;font-weight:800}
.stat .l{font-size:11.5px;color:var(--muted);font-weight:600}

/* Quick actions */
.quick{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.qa{background:var(--card);border:none;border-radius:16px;box-shadow:var(--shadow);padding:12px 6px;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;gap:7px;font-weight:700;font-size:11px;color:var(--ink)}
.qa .qi{width:44px;height:44px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:20px}

/* Chips */
.chips{display:flex;gap:8px;flex-wrap:wrap}
.chip{background:var(--mint);color:var(--green-d);border:none;border-radius:20px;padding:8px 14px;font-weight:700;font-size:12.5px;cursor:pointer}
.chip.pink{background:var(--coral-s);color:#d63a5c}
.chip.violet{background:var(--violet-s);color:#5b3fd6}
.chip.grey{background:var(--line);color:var(--muted)}
.chip.sel{background:var(--green);color:#fff}
.chip.x{background:var(--coral-s);color:#d63a5c}

/* Buttons */
.btn{display:block;width:100%;text-align:center;background:var(--green);color:#fff;border:none;border-radius:16px;
  padding:15px;font-weight:800;font-size:15px;cursor:pointer;box-shadow:0 8px 20px rgba(31,174,126,.35)}
.btn.sec{background:var(--card);color:var(--ink);border:1px solid var(--line);box-shadow:none}
.btn.pink{background:var(--coral);box-shadow:0 8px 20px rgba(255,111,139,.35)}
.btn.violet{background:var(--violet);box-shadow:0 8px 20px rgba(124,92,255,.35)}
.btn.sm{padding:11px;font-size:13.5px;border-radius:13px}
.btn.ghost{background:transparent;color:var(--green-d);box-shadow:none;border:1px dashed var(--green)}

/* List rows */
.row{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--line)}
.row:last-child{border-bottom:none}
.row .ri{width:44px;height:44px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:20px;flex:0 0 44px}
.row .rt{flex:1;min-width:0}
.row .rt b{font-size:14px;font-weight:700;display:block}
.row .rt small{font-size:12px;color:var(--muted)}
.row .rv{font-weight:800;font-size:14px;text-align:right}
.row .rv small{display:block;font-weight:600;color:var(--muted);font-size:11px}

/* Meal option cards */
.opt{border:1.5px solid var(--line);border-radius:16px;padding:12px;margin-bottom:10px;cursor:pointer;transition:.2s}
.opt.sel{border-color:var(--green);background:var(--mint)}
.opt .ot{display:flex;justify-content:space-between;align-items:center}
.opt .ot b{font-size:14px}
.opt .ot .kc{font-size:12px;font-weight:700;color:var(--green-d)}
.opt .od{font-size:12px;color:var(--muted);margin-top:5px}

/* Doctor / product cards */
.pro{display:flex;gap:12px;align-items:center;padding:12px;border:1px solid var(--line);border-radius:16px;margin-bottom:12px;background:var(--card)}
.pro .ph{width:56px;height:56px;border-radius:14px;background:linear-gradient(135deg,#cfeee0,#e9f0ff);display:flex;align-items:center;justify-content:center;font-size:26px;flex:0 0 56px}
.pro .pi{flex:1;min-width:0}
.pro .pi b{font-size:14.5px;font-weight:800;display:block}
.pro .pi small{font-size:12px;color:var(--muted)}
.pro .rate{font-size:12px;font-weight:700;color:var(--amber)}
.price{font-weight:800;color:var(--green-d)}

.prod{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:12px;position:relative}
.prod .pimg{height:96px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:44px;margin-bottom:10px}
.prod b{font-size:13.5px;display:block;line-height:1.2}
.prod .pd{font-size:11px;color:var(--muted);margin:3px 0 8px}
.prod .prow{display:flex;align-items:center;justify-content:space-between}
.add{width:34px;height:34px;border-radius:11px;background:var(--green);color:#fff;border:none;font-size:20px;font-weight:700;cursor:pointer;line-height:1}
.tagbadge{position:absolute;top:10px;right:10px;background:var(--coral);color:#fff;font-size:10px;font-weight:800;padding:3px 8px;border-radius:20px}

/* Calendar */
.cal{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;text-align:center}
.cal .dow{font-size:10px;color:var(--muted);font-weight:700;padding:4px 0}
.cal .d{aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:12.5px;font-weight:700;border-radius:11px;cursor:pointer;position:relative}
.cal .d.period{background:var(--coral);color:#fff}
.cal .d.fertile{background:var(--violet-s);color:#5b3fd6}
.cal .d.ovul{background:var(--violet);color:#fff}
.cal .d.today{outline:2px solid var(--ink)}
.cal .d.pred{background:var(--coral-s);color:#d63a5c}
.legend{display:flex;gap:14px;flex-wrap:wrap;margin-top:12px;font-size:11.5px;color:var(--muted);font-weight:600}
.legend i{width:11px;height:11px;border-radius:4px;display:inline-block;margin-right:5px;vertical-align:-1px}

/* phase strip */
.phase{display:flex;gap:8px;margin:4px 0 2px}
.phase div{flex:1;text-align:center;padding:10px 4px;border-radius:12px;font-size:11px;font-weight:700;background:var(--line);color:var(--muted)}
.phase div.on{background:var(--violet);color:#fff}

/* alert */
.alert{display:flex;gap:10px;padding:12px 14px;border-radius:14px;font-size:12.5px;line-height:1.5;margin-bottom:12px}
.alert.warn{background:#fff4e0;color:#8a5a08}
.alert.ok{background:var(--mint);color:var(--green-d)}
.alert.info{background:#e8f1ff;color:#245a9e}
.alert b{font-weight:800}

/* chat */
.chat{display:flex;flex-direction:column;gap:10px}
.msg{max-width:82%;padding:11px 14px;border-radius:16px;font-size:13.5px;line-height:1.45}
.msg.ai{background:var(--card);box-shadow:var(--shadow);align-self:flex-start;border-bottom-left-radius:5px}
.msg.me{background:var(--green);color:#fff;align-self:flex-end;border-bottom-right-radius:5px}
.chatbar{display:flex;gap:8px;margin-top:12px}
.chatbar input{flex:1;border:1px solid var(--line);border-radius:14px;padding:12px 14px;font-size:13.5px;outline:none}
.chatbar button{background:var(--green);border:none;color:#fff;border-radius:14px;width:48px;font-size:20px;cursor:pointer}

/* toggle list */
.tog{display:flex;align-items:center;gap:12px;padding:13px 0;border-bottom:1px solid var(--line)}
.tog:last-child{border-bottom:none}
.tog .tt{flex:1}
.tog .tt b{font-size:13.5px;display:block}
.tog .tt small{font-size:11.5px;color:var(--muted)}
.switch{width:46px;height:27px;border-radius:20px;background:var(--line);position:relative;cursor:pointer;flex:0 0 46px;transition:.2s}
.switch.on{background:var(--green)}
.switch i{position:absolute;top:3px;left:3px;width:21px;height:21px;background:#fff;border-radius:50%;transition:.2s;box-shadow:0 2px 4px rgba(0,0,0,.2)}
.switch.on i{left:22px}

/* inputs */
.field{margin-bottom:12px}
.field label{font-size:12px;font-weight:700;color:var(--muted);display:block;margin-bottom:6px}
.field input,.field select,.field textarea{width:100%;border:1px solid var(--line);border-radius:13px;padding:12px 13px;font-size:14px;outline:none;font-family:inherit;background:var(--card)}
.seg{display:flex;background:var(--line);border-radius:14px;padding:4px;gap:4px}
.seg button{flex:1;border:none;background:transparent;padding:9px;border-radius:11px;font-weight:700;font-size:12.5px;color:var(--muted);cursor:pointer}
.seg button.on{background:var(--card);color:var(--ink);box-shadow:0 2px 6px rgba(0,0,0,.08)}

/* bottom nav */
.nav{position:absolute;bottom:0;left:0;right:0;height:78px;background:rgba(255,255,255,.92);
  backdrop-filter:blur(14px);border-top:1px solid var(--line);display:flex;align-items:center;justify-content:space-around;padding:0 8px 14px}
.nav button{background:none;border:none;display:flex;flex-direction:column;align-items:center;gap:3px;font-size:10px;font-weight:700;color:var(--muted);cursor:pointer;flex:1}
.nav button .ni{font-size:21px;line-height:1}
.nav button.on{color:var(--green-d)}
.nav .fab{flex:0 0 auto;margin-top:-26px}
.nav .fab .ni{width:56px;height:56px;border-radius:20px;background:linear-gradient(135deg,var(--green),#3fd39f);color:#fff;
  display:flex;align-items:center;justify-content:center;font-size:28px;box-shadow:0 10px 24px rgba(31,174,126,.5)}

/* toast */
.toast{position:absolute;left:50%;bottom:100px;transform:translateX(-50%) translateY(20px);background:#10201a;color:#fff;
  padding:12px 18px;border-radius:14px;font-size:13px;font-weight:600;opacity:0;pointer-events:none;transition:.3s;z-index:50;max-width:80%;text-align:center}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* cart badge */
.cartbadge{position:absolute;top:-6px;right:8px;background:var(--coral);color:#fff;font-size:10px;font-weight:800;min-width:18px;height:18px;border-radius:10px;display:flex;align-items:center;justify-content:center;padding:0 4px}

.banner{border-radius:var(--radius);padding:18px;color:#fff;position:relative;overflow:hidden;margin-bottom:16px}
.banner h4{margin:0 0 6px;font-size:16px;font-weight:800}
.banner p{margin:0;font-size:12.5px;opacity:.92;line-height:1.5}
.banner .b-ic{position:absolute;right:-6px;bottom:-10px;font-size:78px;opacity:.22}
.gg{background:linear-gradient(135deg,var(--green-d),#38c79a)}
.gv{background:linear-gradient(135deg,#6d4dff,#a07bff)}
.gp{background:linear-gradient(135deg,#ff6f8b,#ff9a7a)}

/* camera */
.cam-ov{position:absolute;inset:0;background:#000;z-index:120;display:flex;flex-direction:column;border-radius:40px;overflow:hidden}
.cam-ov video,.cam-ov img.shot{width:100%;height:100%;object-fit:cover;position:absolute;inset:0}
.cam-hint{position:absolute;top:60px;left:0;right:0;text-align:center;color:#fff;font-weight:700;font-size:13px;text-shadow:0 1px 6px rgba(0,0,0,.7);z-index:2}
.cam-frame{position:absolute;inset:120px 40px 200px;border:2px dashed rgba(255,255,255,.6);border-radius:20px;z-index:2}
.cam-ctrl{position:absolute;bottom:40px;left:0;right:0;display:flex;align-items:center;justify-content:center;gap:34px;z-index:3}
.cam-shutter{width:74px;height:74px;border-radius:50%;background:#fff;border:5px solid rgba(255,255,255,.45);cursor:pointer;box-shadow:0 0 0 3px rgba(0,0,0,.15)}
.cam-close{position:absolute;top:52px;right:20px;background:rgba(0,0,0,.45);color:#fff;border:none;width:40px;height:40px;border-radius:50%;font-size:19px;cursor:pointer;z-index:3}
.cam-gal{position:absolute;bottom:52px;right:34px;background:rgba(255,255,255,.2);color:#fff;border:none;padding:10px 14px;border-radius:12px;font-size:12px;font-weight:700;cursor:pointer;z-index:3}
.divider{height:1px;background:var(--line);margin:14px 0}
.tiny{font-size:11px;color:var(--muted);text-align:center;margin-top:6px}
.dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:6px}

/* full screen su telefono: niente cornice, niente finto status bar */
@media (max-width:520px){
  body{padding:0;background:var(--bg);align-items:stretch}
  .phone{max-width:100%;width:100%;height:100vh;height:100dvh;max-height:none;border-radius:0;box-shadow:none}
  .statusbar{display:none}
  .viewport{padding-top:env(safe-area-inset-top,0px)}
  .nav{height:calc(78px + env(safe-area-inset-bottom,0px));padding-bottom:calc(14px + env(safe-area-inset-bottom,0px))}
  .cam-ov{border-radius:0}
}
@media (display-mode:standalone){
  .statusbar{display:none}
  .viewport{padding-top:env(safe-area-inset-top,0px)}
}

/* onboarding */
.onb{position:absolute;inset:0;z-index:130;background:linear-gradient(160deg,#eaf6f0,#f6eff4);display:flex;flex-direction:column;overflow-y:auto;padding:0}
.onb-inner{margin:auto;width:100%;max-width:400px;padding:34px 26px calc(34px + env(safe-area-inset-bottom,0px));padding-top:calc(40px + env(safe-area-inset-top,0px))}
.onb-logo{width:84px;height:84px;border-radius:26px;overflow:hidden;margin:0 auto 18px;box-shadow:var(--shadow);background:#fff}
.onb-logo img{width:100%;height:100%;object-fit:cover}
.onb h2{font-size:24px;font-weight:800;text-align:center;margin:0 0 6px}
.onb p{font-size:13.5px;color:var(--muted);text-align:center;margin:0 0 22px;line-height:1.5}
.onb .field label{font-size:12.5px}
.onb .seg{margin-bottom:4px}
</style>
</head>
<body>
<div class="phone">
  <div class="statusbar">
    <span id="clock">9:41</span>
    <div class="dots"><span></span><span></span><span></span><span style="opacity:.3"></span>
      <svg width="22" height="12" viewBox="0 0 24 12" style="margin-left:4px"><rect x="0" y="1" width="20" height="10" rx="3" fill="none" stroke="#12211b" stroke-width="1.4"/><rect x="2" y="3" width="14" height="6" rx="1.5" fill="#12211b"/><rect x="21" y="4" width="2" height="4" rx="1" fill="#12211b"/></svg>
    </div>
  </div>

  <div class="viewport" id="viewport">
    <!-- screens injected -->
  </div>

  <div class="onb" id="onboard" style="display:none">
    <div class="onb-inner">
      <div class="onb-logo"><img src="icon-192.png" alt="Auréa"></div>
      <h2>Ti diamo il benvenuto in Auréa</h2>
      <p>Creiamo il tuo profilo. Bastano pochi secondi e l'app sarà tutta tua.</p>
      <div class="field"><label>Come ti chiami?</label><input id="onb-name" placeholder="Il tuo nome"></div>
      <div class="field"><label>Sesso</label>
        <div class="seg" id="onb-sex">
          <button class="on" onclick="onbSex('F',this)">Donna</button>
          <button onclick="onbSex('M',this)">Uomo</button>
        </div>
      </div>
      <div class="grid2">
        <div class="field"><label>Peso attuale (kg)</label><input id="onb-wnow" type="number" inputmode="decimal" placeholder="es. 65"></div>
        <div class="field"><label>Peso obiettivo (kg)</label><input id="onb-wgoal" type="number" inputmode="decimal" placeholder="es. 60"></div>
      </div>
      <div class="field"><label>Obiettivo</label>
        <div class="seg" id="onb-goal">
          <button class="on" onclick="onbGoal('Dimagrimento',this)">Dimagrire</button>
          <button onclick="onbGoal('Mantenimento',this)">Mantenere</button>
          <button onclick="onbGoal('Massa',this)">Massa</button>
        </div>
      </div>
      <button class="btn" style="margin-top:8px" onclick="finishOnboard()">Inizia con Auréa</button>
      <button class="btn sec sm" style="margin-top:10px" onclick="skipOnboard()">Esplora la demo</button>
    </div>
  </div>

  <div class="nav" id="nav"></div>
  <div class="toast" id="toast"></div>
</div>

<script>
/* ============ STATE ============ */
const S = {
  user:{name:"Sara", initials:"S", sex:"F", goal:"Dimagrimento", kcalGoal:1850},
  intake:{kcal:1240, prot:78, carb:132, fat:44},
  steps:7420, stepsGoal:10000,
  water:5, waterGoal:8,
  sleep:7.2,
  weight:64.5,
  wStart:69.0, wNow:64.5, wGoal:60.0, wWeeks:12,
  disliked:["Peperoni","Frutti di mare","Fegato"],
  planChoices:{},
  cart:[],
  reminders:[
    {t:"Integratore Omega-3", d:"08:30 · con colazione", on:true, ic:"💊", c:"var(--green)"},
    {t:"Bere acqua", d:"ogni 2 ore", on:true, ic:"💧", c:"var(--blue)"},
    {t:"Visita dermatologica estetica", d:"Gio 24 lug · 15:30", on:true, ic:"✨", c:"var(--coral)"},
    {t:"Assumere Ferro", d:"fase mestruale · 13:00", on:false, ic:"🩸", c:"var(--coral)"},
    {t:"Allenamento gambe", d:"18:00", on:true, ic:"🏋️", c:"var(--violet)"}

/* ============ WEIGHT & PLAN ENGINE ============ */
function weightPlan(){
  const toLose = +(S.wNow - S.wGoal).toFixed(1);        // kg da perdere (o guadagnare se <0)
  const done   = +(S.wStart - S.wNow).toFixed(1);       // kg già persi
  const total  = +(S.wStart - S.wGoal).toFixed(1);      // percorso totale
  const progress = total!==0 ? Math.max(0,Math.min(1, done/total)) : 1;
  const weeklyKg = +(toLose / Math.max(1,S.wWeeks)).toFixed(2); // ritmo settimanale
  const maintenance = 2050;                             // TDEE stimato
  let dailyDelta = Math.round(weeklyKg*7700/7);         // deficit/surplus giornaliero
  dailyDelta = Math.max(-700, Math.min(700, dailyDelta));// cap sano
  let kcal = maintenance - dailyDelta;
  kcal = Math.round(kcal/10)*10;
  if(kcal<1300) kcal=1300;                              // soglia sicurezza
  S.user.kcalGoal = kcal;
  const dir = toLose>0?'perdere':(toLose<0?'aumentare':'mantenere');
  return {toLose,done,total,progress,weeklyKg:Math.abs(weeklyKg),kcal,dailyDelta,dir,maintenance,
          etaWeeks: weeklyKg!==0 ? Math.ceil(Math.abs(toLose)/Math.abs(weeklyKg)) : 0};
}

/* ============ HELPERS ============ */
function ring(pct,color,size=120,sw=13){
  const r=(size-sw)/2, c=2*Math.PI*r, off=c*(1-Math.min(pct,1));
  return `<svg width="${size}" height="${size}">
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="#eef2ef" stroke-width="${sw}"/>
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${color}" stroke-width="${sw}"
      stroke-linecap="round" stroke-dasharray="${c}" stroke-dashoffset="${off}"/></svg>`;
}

/* ============ FOTOCAMERA reale ============ */
function capturePhoto(cb,hint){
  const phone=document.querySelector('.phone');
  const ov=document.createElement('div'); ov.className='cam-ov';
  ov.innerHTML=`<video autoplay playsinline muted></video>
    <div class="cam-frame"></div>
    <div class="cam-hint">${hint||'Inquadra e scatta'}</div>
    <button class="cam-close">✕</button>
    <button class="cam-gal">🖼️ Galleria</button>
    <div class="cam-ctrl"><button class="cam-shutter" aria-label="Scatta"></button></div>`;
  phone.appendChild(ov);
  const video=ov.querySelector('video'); let stream=null;
  function stop(){ try{ if(stream) stream.getTracks().forEach(t=>t.stop()); }catch(e){} ov.remove(); }
  ov.querySelector('.cam-close').onclick=stop;
  ov.querySelector('.cam-gal').onclick=()=>{ stop(); fileFallback(cb); };
  ov.querySelector('.cam-shutter').onclick=()=>{
    const c=document.createElement('canvas');
    c.width=video.videoWidth||720; c.height=video.videoHeight||960;
    try{ c.getContext('2d').drawImage(video,0,0,c.width,c.height); }catch(e){}
    let url; try{ url=c.toDataURL('image/jpeg',0.7);}catch(e){ url=''; }
    stop(); cb(url);
  };
  if(navigator.mediaDevices && navigator.mediaDevices.getUserMedia){
    navigator.mediaDevices.getUserMedia({video:{facingMode:{ideal:'environment'}},audio:false})
      .then(s=>{ stream=s; video.srcObject=s; })
      .catch(()=>{ ov.remove(); fileFallback(cb); });
  } else { ov.remove(); fileFallback(cb); }
}
function fileFallback(cb){
  const inp=document.createElement('input');
  inp.type='file'; inp.accept='image/*'; inp.setAttribute('capture','environment');
  inp.onchange=()=>{ const f=inp.files&&inp.files[0]; if(!f){return;} const rd=new FileReader(); rd.onload=()=>cb(rd.result); rd.readAsDataURL(f); };
  inp.click();
}

/* ============ AI VISION reale (Claude) ============ */
async function callVision(img,prompt){
  const key=(S.aiKey||'').trim(); if(!key) throw new Error('nessuna chiave');
  const b64=(img.split(',')[1])||''; const mt=(img.match(/^data:(image\/[a-zA-Z]+);/)||[])[1]||'image/jpeg';
  if(!b64) throw new Error('foto vuota');
  const res=await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'content-type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
    body:JSON.stringify({model:(S.aiModel||'claude-3-5-sonnet-latest'),max_tokens:1200,
      messages:[{role:'user',content:[{type:'image',source:{type:'base64',media_type:mt,data:b64}},{type:'text',text:prompt}]}]})
  });
  if(!res.ok){ let d=''; try{d=(await res.json()).error?.message||'';}catch(e){} throw new Error('errore '+res.status+(d?' · '+d:'')); }
  const data=await res.json();
  let txt=(data.content&&data.content[0]&&data.content[0].text)||'';
  const m=txt.match(/\{[\s\S]*\}/); if(!m) throw new Error('risposta non valida');
  return JSON.parse(m[0]);
}

    <div id="breath-txt" style="margin-top:14px;font-weight:800;font-size:15px">Inspira…</div></div>`;
  const ball=document.getElementById('breath-ball');const t=document.getElementById('breath-txt');
  let step=0;const seq=[["Inspira…",1.6,4000],["Trattieni…",1.6,3000],["Espira…",0.7,4000]];
  function run(){const[label,scale,ms]=seq[step%3];t.textContent=label;ball.style.transform='scale('+scale+')';step++;box._t=setTimeout(run,ms);}
  clearTimeout(box._t);run();
  setTimeout(()=>{clearTimeout(box._t);if(document.getElementById('breath-txt'))t.textContent='Bravo. Come ti senti ora? 💚';},13000);
}

  {u:"Marco",me:false,txt:"Merluzzo al forno con verdure: 430 kcal e pronto in 20 min 🔥"},
  {u:"Elena",me:false,txt:"Io stasera bowl di quinoa e ceci, ve la consiglio!"}
];
S.fridge=[];
function frigoHTML(){
  return `
  <div class="topbar"><div class="hello"><div class="k">Collegato al tuo piano nutrizionale</div><div class="n">🧊 Il tuo frigo</div></div><div class="avatar" onclick="go('profilo')">${S.user.initials}</div></div>

  <div class="card" style="text-align:center;background:linear-gradient(135deg,#10201a,#1c3830);color:#fff">
    <div style="height:180px;border-radius:16px;border:2px dashed rgba(255,255,255,.3);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px">
      <div style="font-size:58px">🧊</div><div style="font-size:13px;opacity:.8">Apri e inquadra il frigo / la dispensa</div>
    </div>
    <button class="btn" style="margin-top:16px" onclick="capturePhoto(scanFridge,'Inquadra il frigo e scatta')">📸 Apri fotocamera</button>
    <button class="btn sec sm" style="margin-top:10px;background:transparent;color:#fff;border-color:rgba(255,255,255,.3)" onclick="fileFallback(scanFridge)">🖼️ Carica una foto</button>
  </div>
  <div class="alert info"><span>🤖</span><div>L'AI riconosce gli ingredienti, li confronta con il piano <b>${weightPlan().kcal} kcal</b>, esclude i cibi che non gradisci e crea spesa + ricette.</div></div>
  <div id="frigo-res"></div>`;
}
const FRIGO_DEMO={
  have:[{name:"Uova",emoji:"🥚"},{name:"Petto di pollo",emoji:"🍗"},{name:"Spinaci",emoji:"🥬"},{name:"Yogurt greco",emoji:"🥛"},{name:"Pomodori",emoji:"🍅"},{name:"Avocado",emoji:"🥑"},{name:"Riso",emoji:"🍚"},{name:"Formaggio magro",emoji:"🧀"}],
  shopping:[{name:"Salmone",emoji:"🐟",why:"cena del piano"},{name:"Quinoa",emoji:"🌾",why:"pranzo bowl"},{name:"Mirtilli",emoji:"🫐",why:"colazione yogurt"},{name:"Avena",emoji:"🌾",why:"porridge"},{name:"Broccoli",emoji:"🥦",why:"contorno cena"},{name:"Mandorle",emoji:"🥜",why:"spuntino"}],
  recipes:[{name:"Frittata di albumi e spinaci",emoji:"🍳",kcal:390,match:100,have:"uova · spinaci · formaggio",miss:""},{name:"Pollo, riso e pomodori",emoji:"🍗",kcal:520,match:100,have:"pollo · riso · pomodori",miss:""},{name:"Bowl yogurt, avocado e semi",emoji:"🥣",kcal:290,match:85,have:"yogurt · avocado",miss:"mirtilli"}]
};
async function scanFridge(img){
  const r=document.getElementById('frigo-res');
  const photo=img?`<img src="${img}" style="width:100%;border-radius:14px;margin-bottom:12px;max-height:200px;object-fit:cover">`:'';
  r.innerHTML=`<div class="card" style="text-align:center">${photo}<div class="sub">${S.aiKey?'🤖 Claude sta leggendo il frigo…':'Riconoscimento (demo) in corso…'}</div></div>`;
  if(S.aiKey && img){
    try{
      const wp=weightPlan();
      const prompt=`Analizza questa foto di un frigorifero/dispensa. L'utente segue un piano da ${wp.kcal} kcal al giorno, obiettivo "${S.user.goal}", e NON gradisce questi cibi: ${S.disliked.join(', ')||'nessuno'}. Rispondi SOLO con JSON valido, nessun altro testo, in questo formato: {"have":[{"name":"Uova","emoji":"🥚"}],"shopping":[{"name":"Salmone","emoji":"🐟","why":"per una cena proteica"}],"recipes":[{"name":"Frittata","emoji":"🍳","kcal":390,"match":100,"have":"uova, spinaci","miss":""}]}. "have"=ingredienti visibili nella foto. "shopping"=cosa manca per completare pasti sani in linea col piano, escludendo i cibi non graditi. "recipes"=2-4 piatti sani fattibili ora con ciò che c'è nel frigo, match 0-100, "miss"=ingredienti mancanti (stringa vuota se hai tutto).`;
      const j=await callVision(img,prompt);
      renderFridge(r,photo,j,true); return;
    }catch(e){ toast('AI non disponibile: '+e.message+' · uso demo'); }
  }
  setTimeout(()=>renderFridge(r,photo,FRIGO_DEMO,false),1000);
}
function renderFridge(r,photo,j,real){
  const have=j.have||[], shopping=j.shopping||[], recipes=j.recipes||[];
  r.innerHTML=`
      <div class="card">
        ${photo}
        <div class="h">✅ Nel tuo frigo <span class="pill">${real?'AI reale · ':''}${have.length} rilevati</span></div>
        <div class="chips">${have.map(h=>`<span class="chip">${h.emoji||'🍴'} ${h.name}</span>`).join('')||'<span class="sub">Nessun ingrediente riconosciuto.</span>'}</div>
      </div>

      <div class="card">
        <div class="h">🛒 Lista della spesa <span class="pill">per il piano</span></div>
        <div class="sub" style="margin-bottom:10px">Ti manca questo per completare i pasti (cibi non graditi già esclusi):</div>
        <div id="shop-list">${shopping.map(m=>`
          <div class="row" style="padding:10px 0">
            <div class="switch" style="width:40px;height:24px;flex:0 0 40px" onclick="this.classList.toggle('on')"><i style="width:18px;height:18px"></i></div>
            <div class="ri" style="background:var(--mint)">${m.emoji||'🛒'}</div>
            <div class="rt"><b>${m.name}</b><small>${m.why||''}</small></div>
          </div>`).join('')||'<div class="sub">Hai già tutto per il piano ✓</div>'}</div>
        <div class="grid2" style="margin-top:12px">
          <button class="btn sm sec" onclick="toast('Lista inviata sul telefono 📲')">📤 Invia lista</button>
          <button class="btn sm" onclick="toast('Spesa ordinata · consegna oggi 🚚')">🛵 Ordina spesa</button>
        </div>
      </div>

      <div class="card">
        <div class="h">🍽️ Cucina ora col tuo frigo</div>
        <div class="sub" style="margin-bottom:10px">Piatti in linea col piano fattibili con ciò che hai:</div>
        ${recipes.map(rc=>`
          <div class="opt ${rc.match>=100?'sel':''}" onclick="toast('Ricetta: ${(rc.name||'').replace(/'/g,'')}')">
            <div class="ot"><b>${rc.emoji||'🍽️'} ${rc.name}</b><span class="kc">${rc.match||0}% match</span></div>
            <div class="od">${rc.kcal||'?'} kcal · hai: ${rc.have||''}${rc.miss?` · manca: <b style="color:#d63a5c">${rc.miss}</b>`:' · <b style="color:var(--green-d)">tutto pronto ✓</b>'}</div>
          </div>`).join('')||'<div class="sub">Nessuna ricetta suggerita.</div>'}
        <button class="btn ghost sm" onclick="go('coach')">🤖 Chiedi altre idee al coach</button>
      </div>`;
}

/* ============ BUILD ============ */
const BUILDERS={
  home:homeHTML, diario:diarioHTML, scanner:scannerHTML, piano:planHTML,
  ciclo:cicloHTML, prenota:prenotaHTML, shop:shopHTML, coach:coachHTML,
  allenamento:allenamentoHTML, promemoria:promemoriaHTML, profilo:profiloHTML,
  planning:planningHTML, benessere:benessereHTML,
  community:communityHTML, frigo:frigoHTML,
  carrello:()=>''
};
function rebuild(id){const el=document.getElementById('sc-'+id);if(el&&BUILDERS[id])el.innerHTML=BUILDERS[id]();afterRender(id);}
function afterRender(id){
  if(id==='home'){renderHomeAppts();}
  if(id==='piano'){renderDislike();}
  if(id==='prenota'){renderMyAppts();renderDocs('Tutti');}
  if(id==='shop'){renderCartBadge();const b=document.getElementById('shopcart');if(b){const c=cartCount();b.style.display=c?'flex':'none';b.textContent=c;}}
  if(id==='promemoria'){renderReminders();}
  if(id==='planning'){renderPlanBody('cal');}
  if(id==='community'){renderComBody('feed');}
}
function boot(){
  restore();
  Object.keys(BUILDERS).forEach(id=>screen(id, BUILDERS[id]()));
  renderNav();
  Object.keys(BUILDERS).forEach(afterRender);
  go('home');
  save();
  if(!S.setup) showOnboard();
  // clock
  function tick(){const el=document.getElementById('clock');if(el)el.textContent=new Date().getHours()+':'+String(new Date().getMinutes()).padStart(2,'0');}
  tick();setInterval(tick,30000);
}
boot();
if('serviceWorker' in navigator){window.addEventListener('load',()=>{navigator.serviceWorker.register('sw.js').catch(()=>{});});}
</script>
</body>
</html>
